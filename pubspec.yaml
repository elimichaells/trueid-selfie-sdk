name: trueid_sdk
description: Flutter plugin for TrueID identity verification via Ghana Card (NIA). Captures selfie with face detection and verifies against NIA records.
version: 1.0.0
homepage: https://github.com/elimichaells/trueid-flutter-sdk
repository: https://github.com/elimichaells/trueid-flutter-sdk
issue_tracker: https://github.com/elimichaells/trueid-flutter-sdk/issues

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

flutter:
  plugin:
    platforms:
      android:
        package: com.trueid.sdk.flutter
        pluginClass: TrueIdSdkPlugin

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
